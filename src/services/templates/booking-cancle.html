<!DOCTYPE html>
<html>
<body style="margin:0; padding:0; font-family: Arial, sans-serif; background:#f4f6f8;">

<table align="center" width="600" cellpadding="0" cellspacing="0"
       style="background:#ffffff; margin-top:30px; border-radius:8px; overflow:hidden;">

    <tr>
        <td style="background:#dc2626; padding:20px; text-align:center; color:white;">
            <h2 style="margin:0;">Booking Cancelled</h2>
        </td>
    </tr>

    <tr>
        <td style="padding:25px;">
            <p>Hello <strong>{{user_name}}</strong>,</p>

            <p>Your booking has been <strong style="color:red;">cancelled</strong>.</p>

            <table width="100%" cellpadding="8" cellspacing="0" style="margin-top:15px;">
                <tr><td><strong>Booking ID</strong></td><td>{{booking_id}}</td></tr>
                <tr><td><strong>Hotel</strong></td><td>{{hotel_name}}</td></tr>
            </table>

            <div style="margin-top:20px; padding:15px; background:#fde8e8; border-radius:6px;">
                <p><strong>Reason:</strong> {{cancellation_reason}}</p>
                <p><strong>Refund Amount:</strong> LKR {{refund_amount}}</p>
            </div>

            <p style="margin-top:20px;">If you did not request this cancellation, please contact support immediately.</p>
        </td>
    </tr>

</table>
</body>
</html>
